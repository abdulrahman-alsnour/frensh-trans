<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translation Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    padding: 24px;
    min-height: 100vh;
  }
  h1 { text-align: center; font-size: 1.4rem; margin-bottom: 6px; color: #e6edf3; }
  .subtitle { text-align: center; font-size: 0.82rem; color: #6e7681; margin-bottom: 18px; }

  /* ── Language switcher ── */
  .lang-switcher {
    display: flex; gap: 0; justify-content: center; margin-bottom: 22px;
    border: 1px solid #30363d; border-radius: 8px; overflow: hidden; width: fit-content; margin-inline: auto;
  }
  .lang-tab {
    padding: 8px 28px; cursor: pointer; font-size: 0.88rem; font-weight: 600;
    background: #161b22; color: #6e7681; border: none; outline: none;
    transition: background 0.15s, color 0.15s; border-right: 1px solid #30363d;
    letter-spacing: 0.3px;
  }
  .lang-tab:last-child { border-right: none; }
  .lang-tab:hover { background: #21262d; color: #c9d1d9; }
  .lang-tab.active { background: #1f3a5f; color: #58a6ff; }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 18px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: #8b949e; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 22px; font-size: 0.82rem;
  }
  .stats-bar span {
    padding: 3px 12px; border-radius: 20px; background: #161b22; border: 1px solid #30363d;
  }
  .s-done  { color: #3fb950; border-color: #2ea04388 !important; }
  .s-fail  { color: #f85149; border-color: #f8514966 !important; }
  .s-howto { color: #e3a030; border-color: #e3a03066 !important; }
  .s-blank { color: #6e7681; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; align-items: center;
    justify-content: center;
  }
  .toolbar input[type=text] {
    padding: 6px 12px; border-radius: 6px; border: 1px solid #30363d;
    background: #161b22; color: #c9d1d9; font-size: 0.85rem; width: 220px;
  }
  .toolbar input[type=text]::placeholder { color: #484f58; }
  .btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #30363d;
    cursor: pointer; font-size: 0.82rem; background: #21262d; color: #c9d1d9;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: #30363d; border-color: #8b949e; }
  .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
  .btn-primary:hover { background: #2ea043; }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center;
  }
  .filter-bar label { font-size: 0.8rem; color: #6e7681; }
  .filter-btn {
    padding: 3px 10px; border-radius: 12px; border: 1px solid #30363d;
    cursor: pointer; font-size: 0.78rem; background: #161b22; color: #8b949e;
    transition: all 0.15s;
  }
  .filter-btn.active { border-color: #58a6ff; color: #58a6ff; background: #0d2d6e33; }
  .filter-btn:hover { border-color: #8b949e; }

  /* ── Section / item ── */
  .section { margin-bottom: 28px; }
  .section-header {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: #484f58; padding: 6px 0 8px;
    border-bottom: 1px solid #21262d; margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-badge {
    font-size: 0.68rem; background: #161b22; border: 1px solid #30363d;
    border-radius: 10px; padding: 1px 7px; color: #6e7681; font-weight: 400;
  }
  .item {
    display: flex; align-items: flex-start;
    border-left: 3px solid transparent;
    background: #0d1117; border-bottom: 1px solid #161b22;
    transition: border-color 0.15s, background 0.15s;
  }
  .item:hover { background: #161b22; }
  .item.blank  { border-left-color: #30363d; }
  .item.done   { border-left-color: #2ea043; background: #0a1f0d; }
  .item.done:hover { background: #0d2610; }
  .item.fail   { border-left-color: #da3633; background: #1f0a0a; }
  .item.fail:hover { background: #261010; }
  .item.howto  { border-left-color: #9e6a03; background: #1a1400; }
  .item.howto:hover { background: #1f1900; }

  .item-main { flex: 1; padding: 8px 10px; min-width: 0; }
  .key-label { font-size: 0.72rem; color: #484f58; font-family: monospace; margin-bottom: 2px; }
  .phrase { font-size: 0.88rem; word-break: break-word; line-height: 1.4; }
  .item.blank  .phrase { color: #6e7681; }
  .item.done   .phrase { color: #3fb950; }
  .item.fail   .phrase { color: #f85149; }
  .item.howto  .phrase { color: #d29922; }

  .item-controls {
    display: flex; align-items: center; gap: 4px; padding: 8px 8px 8px 0; flex-shrink: 0;
  }
  .status-btn {
    padding: 3px 8px; border-radius: 4px; border: 1px solid #30363d;
    cursor: pointer; font-size: 0.72rem; background: #161b22; color: #8b949e;
    transition: all 0.15s; white-space: nowrap;
  }
  .status-btn:hover { border-color: #8b949e; color: #c9d1d9; }
  .status-btn.active-done   { background: #0d3320; border-color: #2ea043; color: #3fb950; }
  .status-btn.active-fail   { background: #3d0c0c; border-color: #da3633; color: #f85149; }
  .status-btn.active-howto  { background: #2d1f00; border-color: #9e6a03; color: #d29922; }
  .status-btn.active-blank  { background: #21262d; border-color: #484f58; color: #6e7681; }

  .comment-wrap { padding: 0 10px 8px 10px; display: none; }
  .comment-wrap.visible { display: block; }
  .comment-input {
    width: 100%; padding: 6px 10px; border-radius: 5px;
    border: 1px solid #da363366; background: #1f0a0a;
    color: #f88; font-size: 0.82rem; resize: vertical;
    min-height: 44px; font-family: inherit;
  }
  .comment-input::placeholder { color: #7a3535; }
  .hidden-item { display: none !important; }
  #searchBox { width: 200px; }
</style>
</head>
<body>

<h1>Translation Checklist</h1>
<p class="subtitle">Click a status button on any row to update it. Fail rows show a comment field.</p>

<div class="lang-switcher">
  <button class="lang-tab active" onclick="switchLang('fr', this)">🇫🇷 French</button>
  <button class="lang-tab" onclick="switchLang('ms', this)">🇲🇾 Malay (BM)</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#2ea043"></div>Done</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div>Fail</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d29922"></div>How to test</div>
  <div class="legend-item"><div class="legend-dot" style="background:#30363d"></div>Blank / Not tested</div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="toolbar">
  <input type="text" id="searchBox" placeholder="Search phrases..." oninput="applyFilters()" />
  <button class="btn btn-primary" onclick="exportData()">Export JSON</button>
  <button class="btn" onclick="importClick()">Import JSON</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"/>
</div>

<div class="filter-bar">
  <label>Filter:</label>
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('blank',this)">Blank</button>
  <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
  <button class="filter-btn" onclick="setFilter('fail',this)">Fail</button>
  <button class="filter-btn" onclick="setFilter('howto',this)">How to test</button>
</div>

<div id="checklist"></div>

// STATE
// ─────────────────────────────────────────────
var currentLang = 'fr';
var currentFilter = 'all';

function getSections() { return DATA[currentLang]; }

function switchLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('searchBox').value = '';
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelector('.filter-btn').classList.add('active');
  loadLocal();
  renderAll();
}

function setStatus(sectionId, key, newStatus) {
  var section = getSections().find(function(s){ return s.id === sectionId; });
  if (!section) return;
  var item = section.items.find(function(i){ return i.key === key; });
  if (!item) return;
  item.status = (item.status === newStatus) ? 'blank' : newStatus;
  if (item.status !== 'fail') item.comment = '';
  renderAll(); saveLocal();
}

function setComment(sectionId, key, val) {
  var section = getSections().find(function(s){ return s.id === sectionId; });
  if (!section) return;
  var item = section.items.find(function(i){ return i.key === key; });
  if (item) { item.comment = val; saveLocal(); }
}

function renderAll() {
  var searchVal = document.getElementById('searchBox').value.toLowerCase();
  var container = document.getElementById('checklist');
  container.innerHTML = '';
  var counts = { done: 0, fail: 0, howto: 0, blank: 0, total: 0 };

  getSections().forEach(function(section) {
    var secDiv = document.createElement('div');
    secDiv.className = 'section';
    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = section.label + ' <span class="section-badge">' + section.items.length + ' phrases</span>';
    secDiv.appendChild(header);

    var anyVisible = false;
    section.items.forEach(function(item) {
      counts.total++; counts[item.status]++;
      var matchesFilter = currentFilter === 'all' || item.status === currentFilter;
      var matchesSearch = !searchVal || item.key.toLowerCase().includes(searchVal) || item.phrase.toLowerCase().includes(searchVal);
      var visible = matchesFilter && matchesSearch;

      var itemDiv = document.createElement('div');
      itemDiv.className = 'item ' + item.status;
      if (!visible) itemDiv.classList.add('hidden-item');
      else anyVisible = true;

      var main = document.createElement('div');
      main.className = 'item-main';
      main.innerHTML = '<div class="key-label">' + section.id + '.' + item.key + '</div><div class="phrase">' + item.phrase + '</div>';

      var controls = document.createElement('div');
      controls.className = 'item-controls';
      ['done','fail','howto','blank'].forEach(function(s) {
        var btn = document.createElement('button');
        btn.className = 'status-btn' + (item.status === s ? ' active-' + s : '');
        btn.textContent = s === 'howto' ? 'How to test' : s.charAt(0).toUpperCase() + s.slice(1);
        btn.onclick = (function(sid,k,st){ return function(){ setStatus(sid,k,st); }; })(section.id, item.key, s);
        controls.appendChild(btn);
      });

      var commentWrap = document.createElement('div');
      commentWrap.className = 'comment-wrap' + (item.status === 'fail' ? ' visible' : '');
      var commentInput = document.createElement('textarea');
      commentInput.className = 'comment-input';
      commentInput.placeholder = 'Why is it failing?';
      commentInput.value = item.comment || '';
      commentInput.oninput = (function(sid,k){ return function(e){ setComment(sid,k,e.target.value); }; })(section.id, item.key);
      commentWrap.appendChild(commentInput);

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'display:flex;flex-direction:column;flex:1;';
      wrapper.appendChild(main); wrapper.appendChild(commentWrap);
      itemDiv.appendChild(wrapper); itemDiv.appendChild(controls);
      secDiv.appendChild(itemDiv);
    });

    if (!anyVisible && (currentFilter !== 'all' || searchVal)) secDiv.style.display = 'none';
    container.appendChild(secDiv);
  });

  var pct = function(n){ return counts.total ? Math.round(n/counts.total*100) : 0; };
  document.getElementById('statsBar').innerHTML =
    '<span class="s-done">✓ Done: ' + counts.done + ' (' + pct(counts.done) + '%)</span>' +
    '<span class="s-fail">✗ Fail: ' + counts.fail + '</span>' +
    '<span class="s-howto">? How to test: ' + counts.howto + '</span>' +
    '<span class="s-blank">– Blank: ' + counts.blank + '</span>' +
    '<span>Total: ' + counts.total + '</span>';
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active'); renderAll();
}
function applyFilters() { renderAll(); }

function saveLocal() {
  try { localStorage.setItem('checklist-' + currentLang, JSON.stringify(getSections())); } catch(e) {}
}
function loadLocal() {
  try {
    var saved = JSON.parse(localStorage.getItem('checklist-' + currentLang));
    if (!saved) return;
    saved.forEach(function(savedSec) {
      var sec = getSections().find(function(s){ return s.id === savedSec.id; });
      if (!sec) return;
      savedSec.items.forEach(function(savedItem) {
        var item = sec.items.find(function(i){ return i.key === savedItem.key; });
        if (item) { item.status = savedItem.status; item.comment = savedItem.comment || ''; }
      });
    });
  } catch(e) {}
}
function exportData() {
  var data = getSections().map(function(s){
    return { id: s.id, label: s.label, items: s.items.map(function(i){ return { key: i.key, phrase: i.phrase, status: i.status, comment: i.comment }; }) };
  });
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = currentLang + '-translation-checklist.json'; a.click();
}
function importClick() { document.getElementById('importFile').click(); }
function importData(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      data.forEach(function(savedSec) {
        var sec = getSections().find(function(s){ return s.id === savedSec.id; });
        if (!sec) return;
        savedSec.items.forEach(function(savedItem) {
          var item = sec.items.find(function(i){ return i.key === savedItem.key; });
          if (item) { item.status = savedItem.status; item.comment = savedItem.comment || ''; }
        });
      });
      renderAll(); saveLocal();
    } catch(err) { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file); e.target.value = '';
}

loadLocal();
renderAll();
