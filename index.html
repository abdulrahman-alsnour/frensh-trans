<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Translation Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    padding: 24px;
    min-height: 100vh;
  }
  h1 { text-align: center; font-size: 1.4rem; margin-bottom: 6px; color: #e6edf3; }
  .subtitle { text-align: center; font-size: 0.82rem; color: #6e7681; margin-bottom: 20px; }

  .legend {
    display: flex; gap: 18px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: #8b949e; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

  .stats-bar {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 22px; font-size: 0.82rem;
  }
  .stats-bar span {
    padding: 3px 12px; border-radius: 20px; background: #161b22; border: 1px solid #30363d;
  }
  .s-done  { color: #3fb950; border-color: #2ea04388 !important; }
  .s-fail  { color: #f85149; border-color: #f8514966 !important; }
  .s-howto { color: #e3a030; border-color: #e3a03066 !important; }
  .s-blank { color: #6e7681; }

  .toolbar {
    display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; align-items: center;
    justify-content: center;
  }
  .toolbar input[type=text] {
    padding: 6px 12px; border-radius: 6px; border: 1px solid #30363d;
    background: #161b22; color: #c9d1d9; font-size: 0.85rem; width: 220px;
  }
  .toolbar input[type=text]::placeholder { color: #484f58; }
  .btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #30363d;
    cursor: pointer; font-size: 0.82rem; background: #21262d; color: #c9d1d9;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: #30363d; border-color: #8b949e; }
  .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
  .btn-primary:hover { background: #2ea043; }

  .section { margin-bottom: 28px; }
  .section-header {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: #484f58; padding: 6px 0 8px;
    border-bottom: 1px solid #21262d; margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-badge {
    font-size: 0.68rem; background: #161b22; border: 1px solid #30363d;
    border-radius: 10px; padding: 1px 7px; color: #6e7681; font-weight: 400;
  }

  .item {
    display: flex; align-items: flex-start; gap: 0;
    border-left: 3px solid transparent;
    background: #0d1117; border-bottom: 1px solid #161b22;
    transition: border-color 0.15s, background 0.15s;
  }
  .item:hover { background: #161b22; }
  .item.blank  { border-left-color: #30363d; }
  .item.done   { border-left-color: #2ea043; background: #0a1f0d; }
  .item.done:hover { background: #0d2610; }
  .item.fail   { border-left-color: #da3633; background: #1f0a0a; }
  .item.fail:hover { background: #261010; }
  .item.howto  { border-left-color: #9e6a03; background: #1a1400; }
  .item.howto:hover { background: #1f1900; }

  .item-main {
    flex: 1; padding: 8px 10px; min-width: 0;
  }
  .key-label {
    font-size: 0.72rem; color: #484f58; font-family: monospace; margin-bottom: 2px;
  }
  .phrase {
    font-size: 0.88rem; word-break: break-word; line-height: 1.4;
  }
  .item.blank  .phrase { color: #6e7681; }
  .item.done   .phrase { color: #3fb950; }
  .item.fail   .phrase { color: #f85149; }
  .item.howto  .phrase { color: #d29922; }

  .item-controls {
    display: flex; align-items: center; gap: 4px; padding: 8px 8px 8px 0; flex-shrink: 0;
  }
  .status-btn {
    padding: 3px 8px; border-radius: 4px; border: 1px solid #30363d;
    cursor: pointer; font-size: 0.72rem; background: #161b22; color: #8b949e;
    transition: all 0.15s; white-space: nowrap;
  }
  .status-btn:hover { border-color: #8b949e; color: #c9d1d9; }
  .status-btn.active-done   { background: #0d3320; border-color: #2ea043; color: #3fb950; }
  .status-btn.active-fail   { background: #3d0c0c; border-color: #da3633; color: #f85149; }
  .status-btn.active-howto  { background: #2d1f00; border-color: #9e6a03; color: #d29922; }
  .status-btn.active-blank  { background: #21262d; border-color: #484f58; color: #6e7681; }

  .comment-wrap { padding: 0 10px 8px 10px; display: none; }
  .comment-wrap.visible { display: block; }
  .comment-input {
    width: 100%; padding: 6px 10px; border-radius: 5px;
    border: 1px solid #da363366; background: #1f0a0a;
    color: #f88; font-size: 0.82rem; resize: vertical;
    min-height: 44px; font-family: inherit;
  }
  .comment-input::placeholder { color: #7a3535; }

  .filter-bar {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center;
  }
  .filter-bar label { font-size: 0.8rem; color: #6e7681; }
  .filter-btn {
    padding: 3px 10px; border-radius: 12px; border: 1px solid #30363d;
    cursor: pointer; font-size: 0.78rem; background: #161b22; color: #8b949e;
    transition: all 0.15s;
  }
  .filter-btn.active { border-color: #58a6ff; color: #58a6ff; background: #0d2d6e33; }
  .filter-btn:hover { border-color: #8b949e; }

  .hidden-item { display: none !important; }
  .hidden-section .section-header { opacity: 0.4; }

  #searchBox { width: 200px; }
</style>
</head>
<body>

<h1>French Translation Checklist</h1>
<p class="subtitle">Click a status button on any row to update it. Fail rows show a comment field.</p>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#2ea043"></div>Done</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div>Fail</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d29922"></div>How to test</div>
  <div class="legend-item"><div class="legend-dot" style="background:#30363d"></div>Blank / Not tested</div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="toolbar">
  <input type="text" id="searchBox" placeholder="Search phrases..." oninput="applyFilters()" />
  <button class="btn btn-primary" onclick="exportData()">Export JSON</button>
  <button class="btn" onclick="importClick()">Import JSON</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"/>
</div>

<div class="filter-bar">
  <label>Filter:</label>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" data-filter="blank" onclick="setFilter('blank',this)">Blank</button>
  <button class="filter-btn" data-filter="done" onclick="setFilter('done',this)">Done</button>
  <button class="filter-btn" data-filter="fail" onclick="setFilter('fail',this)">Fail</button>
  <button class="filter-btn" data-filter="howto" onclick="setFilter('howto',this)">How to test</button>
</div>

<div id="checklist"></div>

let currentFilter = 'all';

function setStatus(sectionId, key, newStatus) {
  const section = SECTIONS.find(s => s.id === sectionId);
  if (!section) return;
  const item = section.items.find(i => i.key === key);
  if (!item) return;
  if (item.status === newStatus) { item.status = 'blank'; }
  else { item.status = newStatus; }
  if (item.status !== 'fail') item.comment = '';
  renderAll();
  saveLocal();
}

function setComment(sectionId, key, val) {
  const section = SECTIONS.find(s => s.id === sectionId);
  if (!section) return;
  const item = section.items.find(i => i.key === key);
  if (item) { item.comment = val; saveLocal(); }
}

function renderAll() {
  const searchVal = document.getElementById('searchBox').value.toLowerCase();
  const container = document.getElementById('checklist');
  container.innerHTML = '';
  const counts = { done: 0, fail: 0, howto: 0, blank: 0, total: 0 };

  SECTIONS.forEach(section => {
    const secDiv = document.createElement('div');
    secDiv.className = 'section';

    const secCounts = { done: 0, fail: 0, howto: 0, blank: 0 };
    section.items.forEach(it => secCounts[it.status]++);

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `${section.label} <span class="section-badge">${section.items.length} phrases</span>`;
    secDiv.appendChild(header);

    let anyVisible = false;
    section.items.forEach(item => {
      counts.total++;
      counts[item.status]++;

      const matchesFilter = currentFilter === 'all' || item.status === currentFilter;
      const matchesSearch = !searchVal || item.key.toLowerCase().includes(searchVal) || item.phrase.toLowerCase().includes(searchVal);
      const visible = matchesFilter && matchesSearch;

      const itemDiv = document.createElement('div');
      itemDiv.className = `item ${item.status}`;
      if (!visible) itemDiv.classList.add('hidden-item');
      else anyVisible = true;

      const main = document.createElement('div');
      main.className = 'item-main';
      main.innerHTML = `<div class="key-label">${section.id}.${item.key}</div><div class="phrase">${item.phrase}</div>`;

      const controls = document.createElement('div');
      controls.className = 'item-controls';

      ['done','fail','howto','blank'].forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'status-btn' + (item.status === s ? ` active-${s}` : '');
        btn.textContent = s === 'howto' ? 'How to test' : s.charAt(0).toUpperCase() + s.slice(1);
        btn.onclick = () => setStatus(section.id, item.key, s);
        controls.appendChild(btn);
      });

      const commentWrap = document.createElement('div');
      commentWrap.className = 'comment-wrap' + (item.status === 'fail' ? ' visible' : '');

      const commentInput = document.createElement('textarea');
      commentInput.className = 'comment-input';
      commentInput.placeholder = 'Why is it failing?';
      commentInput.value = item.comment || '';
      commentInput.oninput = e => setComment(section.id, item.key, e.target.value);
      commentWrap.appendChild(commentInput);

      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'display:flex; flex-direction:column; flex:1;';
      wrapper.appendChild(main);
      wrapper.appendChild(commentWrap);

      itemDiv.appendChild(wrapper);
      itemDiv.appendChild(controls);
      secDiv.appendChild(itemDiv);
    });

    if (!anyVisible && (currentFilter !== 'all' || searchVal)) {
      secDiv.style.display = 'none';
    }
    container.appendChild(secDiv);
  });

  // Stats
  const pct = n => counts.total ? Math.round(n / counts.total * 100) : 0;
  document.getElementById('statsBar').innerHTML = `
    <span class="s-done">✓ Done: ${counts.done} (${pct(counts.done)}%)</span>
    <span class="s-fail">✗ Fail: ${counts.fail}</span>
    <span class="s-howto">? How to test: ${counts.howto}</span>
    <span class="s-blank">– Blank: ${counts.blank}</span>
    <span>Total: ${counts.total}</span>
  `;
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function applyFilters() { renderAll(); }

function saveLocal() {
  try { localStorage.setItem('fr-checklist', JSON.stringify(SECTIONS)); } catch(e) {}
}

function loadLocal() {
  try {
    const saved = JSON.parse(localStorage.getItem('fr-checklist'));
    if (!saved) return;
    saved.forEach(savedSec => {
      const sec = SECTIONS.find(s => s.id === savedSec.id);
      if (!sec) return;
      savedSec.items.forEach(savedItem => {
        const item = sec.items.find(i => i.key === savedItem.key);
        if (item) { item.status = savedItem.status; item.comment = savedItem.comment || ''; }
      });
    });
  } catch(e) {}
}

function exportData() {
  const export_data = SECTIONS.map(s => ({
    id: s.id, label: s.label,
    items: s.items.map(i => ({ key: i.key, phrase: i.phrase, status: i.status, comment: i.comment }))
  }));
  const blob = new Blob([JSON.stringify(export_data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fr-translation-checklist.json';
  a.click();
}

function importClick() { document.getElementById('importFile').click(); }
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      data.forEach(savedSec => {
        const sec = SECTIONS.find(s => s.id === savedSec.id);
        if (!sec) return;
        savedSec.items.forEach(savedItem => {
          const item = sec.items.find(i => i.key === savedItem.key);
          if (item) { item.status = savedItem.status; item.comment = savedItem.comment || ''; }
        });
      });
      renderAll();
      saveLocal();
    } catch { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

loadLocal();
renderAll();
